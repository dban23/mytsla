
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crna strijela</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  </head>
  <body>
    <h1>Crna strijela</h1>
        <p>My page for using Tesla Fleet API.</p>
        <br>

        {% if page == "me" %}
        <div class="card">
            <h3> My info </h3>
            <div class="item">Full Name: <span>{{ data.response.full_name }}</span></div>
            <div class="item">E-mail: <span>{{ data.response.email }}</span></div>
        </div>

        {% elif page == "monitor_charging" %}
        <div>{{ data }}</div><br>
        <br>
        <a href="/vehicle_data">Get full vehicle data</a><br>
        <br>

        {% else %}
            <p> Unknown page </p>
        {% endif %}

        <a href="/">Return to homepage</a><br>
        <br>
        <a href="/logout">Logout</a>
  </body>
</html>
